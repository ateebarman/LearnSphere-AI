spring.application.name=LearnSphereAI
spring.config.import=optional:file:.env
# Port
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=test
# Disable auto index creation since it's already managed by Node/Mongoose
spring.data.mongodb.auto-index-creation=false

# Redis Configuration
spring.data.redis.url=${REDIS_URL}

# JWT
app.jwt.secret=${JWT_SECRET:your_super_secret_jwt_key}
app.jwt.expiration-ms=2592000000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS Logging
logging.level.org.springframework.web.cors=DEBUG

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_CALLBACK_URL:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email
